<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkyCast - Weather Forecast App</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts: Fraunces (big display numbers), Inter (body text), JetBrains Mono (instrument-style labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="panel">

    <!-- Search bar -->
    <form id="search-form" class="search-row">
      <input
        id="city-input"
        type="text"
        placeholder="ENTER A CITY"
        autocomplete="off"
        aria-label="City name"
      />
      <button type="submit" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <!-- States: loading / error / result -->
    <div id="status" class="status" hidden></div>

    <section id="result" class="result" hidden>
      <p class="location">
        <span id="city-name">—</span>
        <span id="country-name" class="muted"></span>
      </p>

      <div class="hero">
        <div id="icon" class="icon"></div>
        <div class="temp-block">
          <span id="temperature" class="temp">--</span>
          <span class="unit">°C</span>
        </div>
      </div>

      <p id="condition" class="condition">—</p>

      <!-- Instrument-panel style readout row -->
      <div class="readout">
        <div class="reading">
          <span class="reading-label">FEELS LIKE</span>
          <span id="feels-like" class="reading-value">--°</span>
        </div>

        <div class="divider"></div>

        <div class="reading">
          <span class="reading-label">HUMIDITY</span>
          <span id="humidity" class="reading-value">--%</span>
        </div>

        <div class="divider"></div>

        <div class="reading">
          <span class="reading-label">WIND</span>
          <span id="wind" class="reading-value">-- km/h</span>
        </div>
      </div>

      <p id="updated" class="updated"></p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
